<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Itinerary — life moves simpler.</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      color: #2a6070;
      overflow-x: hidden;
    }

    /* ── Background layers ── */
    .bg-base {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 50% 45% at 82% 22%, rgba(255,255,255,0.7) 0%, transparent 60%),
        linear-gradient(160deg, #cfeaf3 0%, #d8eef5 35%, #cbe6f1 70%, #bfe0ee 100%);
      transition: opacity 0.9s ease;
    }
    /* weather scene (revealed with schedule) */
    .bg-weather {
      position: fixed; inset: 0; z-index: 0;
      opacity: 0; pointer-events: none;
      transition: opacity 1.1s ease;
      background: linear-gradient(180deg, #7fc4ec 0%, #9ed3f0 38%, #c4e6f6 70%, #dcf0f8 100%);
    }
    .bg-weather.show { opacity: 1; }
    .bg-weather .sun-big {
      position: absolute; top: 12%; right: 16%; width: 120px; height: 120px; border-radius: 50%;
      background: radial-gradient(circle, #fff7d6 0%, #ffe9a8 45%, rgba(255,233,168,0) 72%);
      filter: blur(2px);
    }
    .cloud { position: absolute; background: rgba(255,255,255,0.92); border-radius: 100px; filter: blur(0.5px); box-shadow: 0 8px 30px rgba(120,170,200,0.25); }
    .cloud::before, .cloud::after { content: ''; position: absolute; background: inherit; border-radius: 50%; }
    .c1 { width: 200px; height: 56px; top: 18%; left: 14%; animation: drift 60s linear infinite; }
    .c1::before { width: 90px; height: 90px; top: -42px; left: 30px; }
    .c1::after  { width: 70px; height: 70px; top: -30px; left: 110px; }
    .c2 { width: 150px; height: 44px; top: 30%; left: 55%; animation: drift 80s linear infinite; }
    .c2::before { width: 70px; height: 70px; top: -34px; left: 24px; }
    .c2::after  { width: 56px; height: 56px; top: -24px; left: 80px; }
    .c3 { width: 170px; height: 48px; top: 52%; left: 28%; opacity: 0.85; animation: drift 100s linear infinite; }
    .c3::before { width: 78px; height: 78px; top: -36px; left: 26px; }
    .c3::after  { width: 60px; height: 60px; top: -26px; left: 92px; }
    @keyframes drift { from { transform: translateX(-30px); } to { transform: translateX(40px); } }

    /* ── Nav ── */
    nav { position: fixed; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between; padding: 26px 36px; z-index: 50; }
    .brand { font-size: 22px; font-weight: 700; color: #2a5f70; }
    .nav-links { display: flex; gap: 30px; }
    .nav-links a { color: #3d7686; text-decoration: none; font-size: 15px; transition: opacity 0.2s; }
    .nav-links a:hover { opacity: 0.6; }

    .nav-search {
      position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; background: rgba(255,255,255,0.8); backdrop-filter: blur(14px);
      border-radius: 30px; box-shadow: 0 6px 22px rgba(60,140,160,0.16); border: 1px solid rgba(255,255,255,0.6);
      padding: 4px; z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.5s ease 0.25s;
    }
    .nav-search.show { opacity: 1; pointer-events: auto; }
    .nav-search .seg { padding: 6px 16px; display: flex; flex-direction: column; }
    .nav-search .seg label { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; color: #5aa9bb; text-transform: uppercase; }
    .nav-search .seg .val { font-size: 13px; color: #2a6070; white-space: nowrap; }
    .nav-search .divline { width: 1px; height: 26px; background: rgba(150,200,210,0.5); }
    .nav-search .mini-btn { width: 36px; height: 36px; border-radius: 50%; background: #6fc3d6; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .nav-search .mini-btn svg { width: 15px; height: 15px; fill: #fff; }

    /* ── Hero ── */
    .hero { position: relative; z-index: 5; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; transition: opacity 0.6s ease, transform 0.6s ease; }
    .hero.lift { opacity: 0; transform: translateY(-60px); pointer-events: none; }
    h1 { font-size: clamp(52px, 8vw, 84px); font-weight: 700; color: #fff; letter-spacing: -0.02em; text-shadow: 0 2px 24px rgba(80,160,180,0.25); }
    .tagline { font-family: Georgia, serif; font-style: italic; font-size: clamp(14px,2vw,18px); color: rgba(255,255,255,0.9); margin: 6px 0 38px; }

    .search-bar { display: flex; align-items: center; background: rgba(255,255,255,0.78); backdrop-filter: blur(16px); border-radius: 44px; width: min(800px, 92vw); box-shadow: 0 8px 32px rgba(60,140,160,0.18); border: 1px solid rgba(255,255,255,0.55); position: relative; }
    .bar-divider { width: 1px; height: 32px; background: rgba(160,210,220,0.5); }
    .bar-section { display: flex; flex-direction: column; padding: 14px 22px; flex: 1; cursor: pointer; }
    .bar-section.search-seg { flex: 1.7; cursor: text; }
    .bar-section label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: #4a9aaa; text-transform: uppercase; margin-bottom: 3px; cursor: inherit; }
    .bar-section input { border: none; background: transparent; font-size: 14px; color: #2a6070; outline: none; width: 100%; font-family: inherit; }
    .bar-section input::placeholder { color: #8ab8c4; }
    .datetime-display { font-size: 14px; color: #8ab8c4; white-space: nowrap; user-select: none; }
    .datetime-display.has-value { color: #2a6070; }
    .search-btn { width: 46px; height: 46px; border-radius: 50%; background: #6fc3d6; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-right: 6px; box-shadow: 0 2px 10px rgba(80,180,200,0.4); transition: background 0.2s, transform 0.15s; }
    .search-btn:hover { background: #5ab4c9; transform: scale(1.05); }
    .search-btn svg { width: 18px; height: 18px; fill: #fff; }

    /* ── Calendar picker ── */
    .picker-overlay { display: none; position: fixed; inset: 0; z-index: 100; }
    .picker-overlay.open { display: block; }
    .picker-popup { position: absolute; background: rgba(255,255,255,0.96); backdrop-filter: blur(20px); border-radius: 20px; box-shadow: 0 16px 48px rgba(60,120,140,0.22); padding: 24px; width: 320px; border: 1px solid rgba(200,230,235,0.6); }
    .picker-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .picker-header .month-year { font-size: 15px; font-weight: 600; color: #2a6070; }
    .picker-header button { background: none; border: none; cursor: pointer; color: #6fc3d6; font-size: 18px; padding: 2px 8px; border-radius: 8px; transition: background 0.15s; }
    .picker-header button:hover { background: rgba(111,195,214,0.12); }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 16px; }
    .cal-day-name { text-align: center; font-size: 11px; font-weight: 600; color: #8ab8c4; padding: 4px 0 8px; }
    .cal-day { text-align: center; padding: 7px 4px; border-radius: 8px; font-size: 13px; color: #2a6070; cursor: pointer; border: none; background: none; transition: background 0.15s, color 0.15s; }
    .cal-day:hover:not(:disabled) { background: rgba(111,195,214,0.18); }
    .cal-day.selected { background: #6fc3d6; color: #fff; font-weight: 600; }
    .cal-day.today { border: 1.5px solid #6fc3d6; }
    .cal-day:disabled { color: #c8dde2; cursor: default; }
    .time-section { border-top: 1px solid rgba(160,210,220,0.3); padding-top: 14px; display: flex; align-items: center; gap: 10px; }
    .time-section label { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; color: #4a9aaa; text-transform: uppercase; }
    .time-inputs { display: flex; align-items: center; gap: 4px; flex: 1; }
    .time-inputs input { width: 52px; text-align: center; border: 1px solid rgba(160,210,220,0.5); border-radius: 8px; padding: 6px 4px; font-size: 15px; color: #2a6070; outline: none; font-family: inherit; background: rgba(240,250,252,0.8); }
    .time-inputs input:focus { border-color: #6fc3d6; }
    .time-sep { font-size: 16px; color: #4a9aaa; font-weight: 600; }
    .ampm-btn { background: rgba(111,195,214,0.12); border: none; border-radius: 8px; padding: 6px 10px; color: #2a6070; font-size: 13px; font-weight: 600; cursor: pointer; }
    .ampm-btn:hover { background: rgba(111,195,214,0.25); }
    .picker-footer { display: flex; justify-content: flex-end; margin-top: 14px; gap: 8px; }
    .btn-clear { background: none; border: none; color: #8ab8c4; font-size: 13px; cursor: pointer; padding: 6px 12px; border-radius: 10px; }
    .btn-clear:hover { background: rgba(160,210,220,0.2); }
    .btn-apply { background: #6fc3d6; border: none; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; padding: 7px 18px; border-radius: 10px; }
    .btn-apply:hover { background: #5ab4c9; }

    /* ── Schedule ── */
    .schedule-screen { display: none; position: relative; z-index: 5; padding: 120px 40px 80px; min-height: 100vh; }
    .schedule-screen.show { display: block; }
    .rows { display: flex; flex-direction: column; align-items: center; }
    .sched-row { display: flex; align-items: stretch; }
    .card { position: relative; background: rgba(255,255,255,0.82); backdrop-filter: blur(10px); border-radius: 22px; box-shadow: 0 10px 30px rgba(70,140,160,0.14); border: 1px solid rgba(255,255,255,0.6); cursor: pointer; opacity: 0; transform: translateY(24px); transition: opacity 0.5s ease, transform 0.5s ease, box-shadow 0.2s, outline 0.15s; outline: 2px solid transparent; }
    .card.in { opacity: 1; transform: translateY(0); }
    .card:hover { box-shadow: 0 16px 40px rgba(70,140,160,0.22); }
    .card.active { outline: 2px solid #6fc3d6; }
    .card.transport { width: 210px; padding: 22px; display: flex; flex-direction: column; }
    .t-icon { width: 40px; height: 40px; border-radius: 12px; background: #8fcfde; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
    .t-icon svg { width: 22px; height: 22px; fill: #fff; }
    .card .title { font-size: 19px; font-weight: 700; color: #2a5f70; margin-bottom: 12px; }
    .card .meta { font-size: 13px; color: #5a8a98; margin-bottom: 5px; }
    .card .sub { font-size: 12px; color: #93b6c0; }
    .card .price-tag { margin-top: 12px; font-size: 13px; font-weight: 600; color: #3d8294; }
    .card.destination { width: 320px; display: flex; overflow: hidden; padding: 0; }
    .dest-photo { width: 130px; flex-shrink: 0; background: linear-gradient(165deg, #cdeaf4 0%, #9fd6e6 55%, #6fbcd0 100%); position: relative; }
    .dest-photo .sun { position: absolute; top: 26%; left: 30%; width: 34px; height: 34px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.95), rgba(255,255,255,0.4)); filter: blur(2px); }
    .dest-photo .hill { position: absolute; bottom: 0; left: 0; right: 0; height: 45%; background: linear-gradient(180deg, rgba(90,180,200,0.5), rgba(70,160,185,0.8)); border-radius: 50% 50% 0 0 / 70% 70% 0 0; }
    .dest-body { padding: 20px 22px; display: flex; flex-direction: column; justify-content: center; }
    .dest-body .title { margin-bottom: 8px; }
    .rating { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .stars { display: inline-flex; gap: 1px; }
    .stars svg { width: 15px; height: 15px; }
    .rating .num { font-size: 13px; font-weight: 700; color: #2a5f70; }
    .rating .price { font-size: 13px; font-weight: 600; color: #3d8294; margin-left: 2px; }
    .dest-body .desc { font-family: Georgia, serif; font-style: italic; font-size: 13px; color: #6a98a6; line-height: 1.45; }
    .connector-h { align-self: center; width: 56px; height: 2px; flex-shrink: 0; background-image: linear-gradient(90deg, #8cc6d6 40%, transparent 40%); background-size: 9px 2px; }
    .connector-v { width: 2px; flex-shrink: 0; background-image: linear-gradient(180deg, #8cc6d6 40%, transparent 40%); background-size: 2px 9px; }
    .row-gap { height: 46px; display: flex; }

    /* edit bar */
    .edit-zone { position: relative; display: flex; flex-direction: column; align-items: center; margin-top: 30px; }
    .edit-bar { display: none; align-items: center; gap: 12px; background: rgba(255,255,255,0.92); backdrop-filter: blur(14px); border-radius: 30px; padding: 14px 18px 14px 24px; box-shadow: 0 12px 34px rgba(60,140,160,0.2); border: 1px solid rgba(255,255,255,0.7); opacity: 0; transform: translateY(12px); transition: opacity 0.35s ease, transform 0.35s ease; }
    .edit-bar.show { display: flex; opacity: 1; transform: translateY(0); }
    .edit-bar .q { font-size: 14px; color: #3d7686; }
    .edit-bar .q b { color: #2a5f70; }
    .edit-bar input { border: none; outline: none; background: rgba(240,250,252,0.8); border-radius: 20px; padding: 9px 16px; font-size: 14px; width: 260px; color: #2a6070; font-family: inherit; }
    .edit-bar input::placeholder { color: #8ab8c4; }
    .edit-bar .go { width: 38px; height: 38px; border-radius: 50%; background: #6fc3d6; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .edit-bar .go svg { width: 15px; height: 15px; fill: #fff; }
    #pointerSvg { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 40; }

    /* ── Weather box (bottom-left) ── */
    .weather-box {
      position: fixed; bottom: 26px; left: 26px; z-index: 45;
      display: none; align-items: center; gap: 16px;
      background: rgba(255,255,255,0.85); backdrop-filter: blur(14px);
      border-radius: 18px; padding: 16px 20px;
      box-shadow: 0 10px 30px rgba(60,140,160,0.2); border: 1px solid rgba(255,255,255,0.7);
      opacity: 0; transform: translateY(14px); transition: opacity 0.6s ease 0.5s, transform 0.6s ease 0.5s;
    }
    .weather-box.show { display: flex; opacity: 1; transform: translateY(0); }
    .weather-box .w-icon { width: 46px; height: 46px; flex-shrink: 0; }
    .weather-box .w-text .cond { font-size: 13px; color: #5a8a98; margin-bottom: 4px; }
    .weather-box .w-temps { display: flex; align-items: baseline; gap: 10px; }
    .weather-box .hi { font-size: 26px; font-weight: 700; color: #2a5f70; }
    .weather-box .lo { font-size: 16px; font-weight: 600; color: #93b6c0; }
    .weather-box .deg { font-size: 11px; color: #93b6c0; letter-spacing: 0.05em; }
  </style>
</head>
<body>

<div class="bg-base" id="bgBase"></div>
<div class="bg-weather" id="bgWeather">
  <div class="sun-big"></div>
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
</div>

<nav>
  <div class="brand">Itinerary</div>
  <div class="nav-links"><a href="#">Pricing</a><a href="#">About us</a></div>
</nav>

<div class="nav-search" id="navSearch">
  <div class="seg"><label>Search</label><span class="val" id="navQ">—</span></div>
  <div class="divline"></div>
  <div class="seg"><label>Start</label><span class="val" id="navStart">—</span></div>
  <div class="divline"></div>
  <div class="seg"><label>End</label><span class="val" id="navEnd">—</span></div>
  <button class="mini-btn"><svg viewBox="0 0 24 24"><path d="M21.7 20.3l-4.9-4.9A8.3 8.3 0 1 0 15.4 16.8l4.9 4.9a1 1 0 0 0 1.4-1.4zM10.5 17a6.5 6.5 0 1 1 0-13 6.5 6.5 0 0 1 0 13z"/></svg></button>
</div>

<main class="hero" id="hero">
  <h1>Itinerary</h1>
  <p class="tagline">life moves simpler.</p>
  <div class="search-bar">
    <div class="bar-section search-seg">
      <label for="searchInput">Search</label>
      <input type="text" id="searchInput" placeholder="what were you thinking?" />
    </div>
    <div class="bar-divider"></div>
    <div class="bar-section" id="startSection" onclick="openPicker('start', event)">
      <label>Start Time</label>
      <div class="datetime-display" id="startDisplay">Add date</div>
    </div>
    <div class="bar-divider"></div>
    <div class="bar-section" id="endSection" onclick="openPicker('end', event)">
      <label>End Time</label>
      <div class="datetime-display" id="endDisplay">Add date</div>
    </div>
    <button class="search-btn" onclick="runSearch()" aria-label="Search">
      <svg viewBox="0 0 24 24"><path d="M21.7 20.3l-4.9-4.9A8.3 8.3 0 1 0 15.4 16.8l4.9 4.9a1 1 0 0 0 1.4-1.4zM10.5 17a6.5 6.5 0 1 1 0-13 6.5 6.5 0 0 1 0 13z"/></svg>
    </button>
  </div>
</main>

<!-- Calendar picker -->
<div class="picker-overlay" id="pickerOverlay" onclick="overlayClick(event)">
  <div class="picker-popup" id="pickerPopup">
    <div class="picker-header">
      <button onclick="changeMonth(-1)">&#8249;</button>
      <span class="month-year" id="monthYear"></span>
      <button onclick="changeMonth(1)">&#8250;</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
    <div class="time-section">
      <label>Time</label>
      <div class="time-inputs">
        <input type="number" id="hourInput" min="1" max="12" placeholder="12" />
        <span class="time-sep">:</span>
        <input type="number" id="minInput" min="0" max="59" placeholder="00" />
      </div>
      <button class="ampm-btn" id="ampmBtn" onclick="toggleAmPm()">AM</button>
    </div>
    <div class="picker-footer">
      <button class="btn-clear" onclick="clearPicker()">Clear</button>
      <button class="btn-apply" onclick="applyPicker()">Apply</button>
    </div>
  </div>
</div>

<section class="schedule-screen" id="schedule">
  <div class="rows" id="rows"></div>
  <div class="edit-zone">
    <div class="edit-bar" id="editBar">
      <span class="q">Switch out <b id="editTarget">this</b> for…</span>
      <input type="text" placeholder="what would you prefer?" />
      <button class="go"><svg viewBox="0 0 24 24"><path d="M21.7 20.3l-4.9-4.9A8.3 8.3 0 1 0 15.4 16.8l4.9 4.9a1 1 0 0 0 1.4-1.4zM10.5 17a6.5 6.5 0 1 1 0-13 6.5 6.5 0 0 1 0 13z"/></svg></button>
    </div>
  </div>
</section>

<!-- Weather box -->
<div class="weather-box" id="weatherBox">
  <svg class="w-icon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <circle cx="24" cy="24" r="11" fill="#ffd24d"/>
    <g stroke="#ffd24d" stroke-width="2.5" stroke-linecap="round">
      <line x1="24" y1="6" x2="24" y2="11"/>
      <line x1="24" y1="37" x2="24" y2="42"/>
      <line x1="6" y1="24" x2="11" y2="24"/>
      <line x1="9" y1="9" x2="13" y2="13"/>
      <line x1="35" y1="13" x2="39" y2="9"/>
    </g>
    <path d="M30 44a9 9 0 0 1 17.6-2.6A8 8 0 1 1 49 57H32a6.5 6.5 0 0 1-2-12.7z" fill="#eef4f7" stroke="#cfe0e6" stroke-width="1.5"/>
  </svg>
  <div class="w-text">
    <div class="cond">Partly cloudy &amp; sunny</div>
    <div class="w-temps">
      <span class="hi">25°<span class="deg"> H</span></span>
      <span class="lo">15°<span class="deg"> L</span></span>
    </div>
  </div>
</div>

<svg id="pointerSvg"></svg>

<script>
  /* ── Calendar picker ── */
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  let activePicker = null;
  let pickerState = { year:0, month:0, selectedDate:null, hour:12, min:0, ampm:'AM' };
  let startValue = null, endValue = null;

  function openPicker(which, e) {
    e && e.stopPropagation();
    activePicker = which;
    const existing = which === 'start' ? startValue : endValue;
    const now = new Date();
    pickerState = {
      year: existing ? existing.year : now.getFullYear(),
      month: existing ? existing.month : now.getMonth(),
      selectedDate: existing ? existing.day : null,
      hour: existing ? existing.hour : 12,
      min: existing ? existing.min : 0,
      ampm: existing ? existing.ampm : 'AM',
    };
    const rect = document.getElementById(which + 'Section').getBoundingClientRect();
    const popup = document.getElementById('pickerPopup');
    popup.style.top = (rect.bottom + 10) + 'px';
    let left = rect.left;
    if (left + 320 > window.innerWidth - 12) left = window.innerWidth - 332;
    popup.style.left = left + 'px';
    document.getElementById('pickerOverlay').classList.add('open');
    renderCalendar(); syncTimeInputs();
  }
  function overlayClick(e) { if (e.target === document.getElementById('pickerOverlay')) closePicker(); }
  function closePicker() { document.getElementById('pickerOverlay').classList.remove('open'); activePicker = null; }
  function renderCalendar() {
    const { year, month, selectedDate } = pickerState;
    document.getElementById('monthYear').textContent = MONTHS[month] + ' ' + year;
    const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
    DAYS.forEach(d => { const el = document.createElement('div'); el.className = 'cal-day-name'; el.textContent = d; grid.appendChild(el); });
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = new Date();
    for (let i = 0; i < firstDay; i++) { const b = document.createElement('button'); b.className = 'cal-day'; b.disabled = true; grid.appendChild(b); }
    for (let d = 1; d <= daysInMonth; d++) {
      const btn = document.createElement('button'); btn.className = 'cal-day'; btn.textContent = d;
      if (d === selectedDate) btn.classList.add('selected');
      if (d === today.getDate() && month === today.getMonth() && year === today.getFullYear()) btn.classList.add('today');
      btn.onclick = () => { pickerState.selectedDate = d; renderCalendar(); };
      grid.appendChild(btn);
    }
  }
  function changeMonth(delta) {
    let { year, month } = pickerState; month += delta;
    if (month < 0) { month = 11; year--; } if (month > 11) { month = 0; year++; }
    pickerState.year = year; pickerState.month = month; renderCalendar();
  }
  function syncTimeInputs() {
    document.getElementById('hourInput').value = pickerState.hour;
    document.getElementById('minInput').value = String(pickerState.min).padStart(2,'0');
    document.getElementById('ampmBtn').textContent = pickerState.ampm;
  }
  function toggleAmPm() { pickerState.ampm = pickerState.ampm === 'AM' ? 'PM' : 'AM'; document.getElementById('ampmBtn').textContent = pickerState.ampm; }
  function applyPicker() {
    if (!pickerState.selectedDate) { closePicker(); return; }
    const h = parseInt(document.getElementById('hourInput').value) || 12;
    const m = parseInt(document.getElementById('minInput').value) || 0;
    const ampm = document.getElementById('ampmBtn').textContent;
    const val = { year: pickerState.year, month: pickerState.month, day: pickerState.selectedDate, hour: h, min: m, ampm };
    const label = MONTHS[val.month].slice(0,3) + ' ' + val.day + ', ' + String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ' ' + ampm;
    if (activePicker === 'start') { startValue = val; const el = document.getElementById('startDisplay'); el.textContent = label; el.classList.add('has-value'); }
    else { endValue = val; const el = document.getElementById('endDisplay'); el.textContent = label; el.classList.add('has-value'); }
    closePicker();
  }
  function clearPicker() {
    if (activePicker === 'start') { startValue = null; const el = document.getElementById('startDisplay'); el.textContent = 'Add date'; el.classList.remove('has-value'); }
    else { endValue = null; const el = document.getElementById('endDisplay'); el.textContent = 'Add date'; el.classList.remove('has-value'); }
    closePicker();
  }

  /* ── Itinerary data ── */
  const ICONS = {
    bus: '<svg viewBox="0 0 24 24"><path d="M4 16c0 .88.39 1.67 1 2.22V20a1 1 0 0 0 1 1h1a1 1 0 0 0 1-1v-1h8v1a1 1 0 0 0 1 1h1a1 1 0 0 0 1-1v-1.78c.61-.55 1-1.34 1-2.22V6c0-3.5-3.58-4-8-4s-8 .5-8 4v10zm3.5 1a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm9 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zM18 11H6V6h12v5z"/></svg>',
    subway: '<svg viewBox="0 0 24 24"><path d="M12 2c-4 0-8 .5-8 4v9.5A3.5 3.5 0 0 0 7.5 19L6 20.5V21h2.23l2-2h3.54l2 2H18v-.5L16.5 19a3.5 3.5 0 0 0 3.5-3.5V6c0-3.5-4-4-8-4zM7.5 17A1.5 1.5 0 1 1 9 15.5 1.5 1.5 0 0 1 7.5 17zM11 10H6V6h5v4zm2 0V6h5v4h-5zm3.5 7a1.5 1.5 0 1 1 1.5-1.5 1.5 1.5 0 0 1-1.5 1.5z"/></svg>'
  };
  const items = [
    { type:'transport', name:'Bus 91', icon:'bus', meta:'Bus · 1h 15m', sub:'Bayview Ave & Taylor Mills Dr S → Finch Station', times:'2:35 board · 3:50 arrive', price:'$4.50' },
    { type:'transport', name:'Subway', icon:'subway', meta:'Subway · 35m', sub:'Finch Station → Union Station', times:'3:55 board · 4:30 arrive', price:'Free Transfer' },
    { type:'destination', name:'Scotiabank Arena', rating:4.5, price:'$30', desc:'Leafs Game' }
  ];
  const PER_ROW = 3;

  function starSvg(fill) {
    const id = 'g' + Math.random().toString(36).slice(2,8);
    if (fill === 'half') return `<svg viewBox="0 0 24 24"><defs><linearGradient id="${id}"><stop offset="50%" stop-color="#f5c518"/><stop offset="50%" stop-color="#dfe7ea"/></linearGradient></defs><path fill="url(#${id})" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
    const paint = fill === 'empty' ? '#dfe7ea' : '#f5c518';
    return `<svg viewBox="0 0 24 24"><path fill="${paint}" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
  }
  function renderStars(rating) {
    let html = '';
    for (let i = 1; i <= 5; i++) html += rating >= i ? starSvg('full') : (rating >= i - 0.5 ? starSvg('half') : starSvg('empty'));
    return `<span class="stars">${html}</span>`;
  }
  function cardHtml(item, idx) {
    if (item.type === 'transport') {
      return `<div class="card transport" data-idx="${idx}" onclick="selectCard(${idx})">
        <div class="t-icon">${ICONS[item.icon]}</div>
        <div class="title">${item.name}</div>
        <div class="meta">${item.meta}</div>
        <div class="sub">${item.sub}</div>
        <div class="sub" style="margin-top:6px">${item.times}</div>
        <div class="price-tag">${item.price}</div>
      </div>`;
    }
    return `<div class="card destination" data-idx="${idx}" onclick="selectCard(${idx})">
      <div class="dest-photo"><div class="sun"></div><div class="hill"></div></div>
      <div class="dest-body">
        <div class="title">${item.name}</div>
        <div class="rating">${renderStars(item.rating)}<span class="num">${item.rating.toFixed(1)}</span><span class="price">· ${item.price}</span></div>
        <div class="desc">${item.desc}</div>
      </div>
    </div>`;
  }
  function buildSchedule() {
    const rows = document.getElementById('rows'); rows.innerHTML = '';
    for (let r = 0; r * PER_ROW < items.length; r++) {
      const slice = items.slice(r * PER_ROW, r * PER_ROW + PER_ROW);
      const reverse = r % 2 === 1;
      const row = document.createElement('div'); row.className = 'sched-row';
      row.style.flexDirection = reverse ? 'row-reverse' : 'row';
      slice.forEach((item, i) => {
        const globalIdx = r * PER_ROW + i;
        const wrap = document.createElement('div'); wrap.style.display = 'contents';
        wrap.innerHTML = cardHtml(item, globalIdx);
        row.appendChild(wrap.firstElementChild);
        if (i < slice.length - 1) { const c = document.createElement('div'); c.className = 'connector-h'; row.appendChild(c); }
      });
      rows.appendChild(row);
      if ((r + 1) * PER_ROW < items.length) {
        const gap = document.createElement('div'); gap.className = 'row-gap';
        gap.style.justifyContent = reverse ? 'flex-start' : 'flex-end';
        gap.style.paddingRight = reverse ? '0' : '104px';
        gap.style.paddingLeft = reverse ? '104px' : '0';
        const v = document.createElement('div'); v.className = 'connector-v'; gap.appendChild(v);
        rows.appendChild(gap);
      }
    }
  }

  function fmt(v) { return MONTHS[v.month].slice(0,3) + ' ' + v.day + ', ' + String(v.hour).padStart(2,'0') + ':' + String(v.min).padStart(2,'0') + ' ' + v.ampm; }

  function runSearch() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q || !startValue || !endValue) { alert('Enter a search and pick both start and end dates to build your itinerary.'); return; }
    document.getElementById('navQ').textContent = q;
    document.getElementById('navStart').textContent = fmt(startValue);
    document.getElementById('navEnd').textContent = fmt(endValue);
    buildSchedule();
    document.getElementById('hero').classList.add('lift');
    setTimeout(() => {
      document.getElementById('hero').style.display = 'none';
      document.getElementById('schedule').classList.add('show');
      document.getElementById('navSearch').classList.add('show');
      document.getElementById('bgWeather').classList.add('show');
      document.getElementById('bgBase').style.opacity = '0';
      document.getElementById('weatherBox').classList.add('show');
      document.querySelectorAll('.card').forEach((c, i) => setTimeout(() => c.classList.add('in'), 120 + i * 130));
    }, 480);
  }

  /* ── Card selection ── */
  let activeIdx = null;
  function selectCard(idx) {
    if (activeIdx === idx) { closeEdit(); return; }
    activeIdx = idx;
    document.querySelectorAll('.card').forEach(c => c.classList.toggle('active', +c.dataset.idx === idx));
    document.getElementById('editTarget').textContent = items[idx].name;
    document.getElementById('editBar').classList.add('show');
    requestAnimationFrame(() => requestAnimationFrame(drawPointer));
  }
  function closeEdit() {
    activeIdx = null;
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    document.getElementById('editBar').classList.remove('show');
    document.getElementById('pointerSvg').innerHTML = '';
  }
  function drawPointer() {
    const svg = document.getElementById('pointerSvg'); svg.innerHTML = '';
    if (activeIdx === null) return;
    const card = document.querySelector(`.card[data-idx="${activeIdx}"]`);
    const bar = document.getElementById('editBar');
    if (!card || !bar.classList.contains('show')) return;
    const cr = card.getBoundingClientRect(), br = bar.getBoundingClientRect();
    const x1 = br.left + br.width / 2, y1 = br.top;
    const x2 = cr.left + cr.width / 2, y2 = cr.bottom;
    const my = (y1 + y2) / 2;
    svg.innerHTML = `<path d="M ${x1} ${y1} C ${x1} ${my}, ${x2} ${my}, ${x2} ${y2}" fill="none" stroke="#6fc3d6" stroke-width="2" stroke-dasharray="6 6" opacity="0.8"/><circle cx="${x2}" cy="${y2}" r="4" fill="#6fc3d6"/>`;
  }
  window.addEventListener('resize', drawPointer);
  window.addEventListener('scroll', drawPointer, true);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') { closePicker(); closeEdit(); } });
  document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });
</script>
</body>
</html>
